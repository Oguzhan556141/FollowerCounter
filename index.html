<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulf Tech - Instagram Takipçi Sayacı</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation">
        <div class="stars"></div>
        <div class="grid"></div>
        <audio id="celebration-sound" src="https://assets.mixkit.co/active_storage/sfx/2012/2012-preview.mp3" preload="auto"></audio>
        <audio id="follower-chime" src="https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3" preload="auto"></audio>
    </div>

    <main class="container">
        <div class="glass-card">
            <!-- Vertical Progress Bar -->
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progress-bar"></div>
                </div>
                <div class="progress-text">
                    <span id="progress-percent">0</span>%
                </div>
            </div>
            
            <header>
                <div class="logo-container">
                    <img src="https://gulftechrobotic.com.tr/kopek-removebg-preview.png" alt="Gulf Tech Logo" class="brand-logo">
                    <h1>GULF TECH #11392</h1>
                </div>
            </header>

            <section class="counter-section">
                <p class="subtitle">CANLI INSTAGRAM TAKİPÇİ SAYISI</p>
                <div class="counter-display" id="follower-counter">
                    <span class="count">0</span>
                </div>
                <div class="username">@gulftechtr</div>
                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.instagram.com/gulftechtr/" alt="Instagram QR Code" class="qr-code">
                    <p class="qr-text">Takip Etmek İçin Okutun</p>
                </div>
            </section>

            <footer>
                <div class="update-info">
                    <span class="pulse"></span>
                    Son Güncelleme: <span id="last-update">Şimdi</span>
                    <span style="margin: 0 10px; opacity: 0.3;">|</span>
                    Kalan: <span id="update-countdown">30</span>s
                    <span style="margin: 0 10px; opacity: 0.3;">|</span>
                    <span id="sound-status" style="cursor: pointer; color: var(--accent-yellow); font-size: 0.8rem;" title="Sesi Test Et">🔊 Sesleri Aktif Et</span>
                </div>
            </footer>
        </div>
    </main>

    <!-- Orion Constellation -->
    <div class="orion-container">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" class="orion-svg">
            <circle cx="50" cy="10" r="2" class="star betelgeuse" />
            <circle cx="55" cy="50" r="1.5" class="star alnitak" />
            <circle cx="50" cy="55" r="1.5" class="star alnilam" />
            <circle cx="45" cy="60" r="1.5" class="star mintaka" />
            <circle cx="20" cy="20" r="1.5" class="star bellatrix" />
            <circle cx="80" cy="110" r="2" class="star rigel" />
            <circle cx="15" cy="105" r="1.5" class="star saiph" />
            
            <!-- Lines -->
            <line x1="50" y1="10" x2="55" y2="50" class="constellation-line" />
            <line x1="55" y1="50" x2="50" y2="55" class="constellation-line" />
            <line x1="50" y1="55" x2="45" y2="60" class="constellation-line" />
            <line x1="20" y1="20" x2="45" y2="60" class="constellation-line" />
            <line x1="45" y1="60" x2="15" y2="105" class="constellation-line" />
            <line x1="55" y1="50" x2="80" y2="110" class="constellation-line" />
        </svg>
        <span class="orion-label">ORION</span>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
